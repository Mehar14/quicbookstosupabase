<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBooks Data Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div id="sidebar-overlay" class="sidebar-overlay hidden" aria-hidden="true"></div>

    <aside id="sidebar" class="sidebar">
      <div class="brand">
        <div class="brand-icon">QB</div>
        <div>
          <h1>QuickBooks</h1>
          <p>Data Display</p>
        </div>
      </div>

      <div class="sidebar-section">
        <span class="section-label">Objects</span>
        <nav id="entity-nav" class="entity-nav"></nav>
      </div>
    </aside>

    <main class="main">
      <header class="main-toolbar">
        <button id="menu-btn" class="icon-btn menu-btn" type="button" aria-label="Open menu">
          <span class="menu-icon"></span>
        </button>

        <div class="toolbar-title">QuickBooks Data</div>

        <div class="toolbar-actions">
          <div class="search-wrap">
            <input id="search-input" type="search" placeholder="Search records..." disabled>
          </div>
          <button id="refresh-btn" class="btn btn-primary" type="button">
            <span class="btn-icon">↻</span>
            <span class="btn-label">Refresh</span>
          </button>
          <button id="theme-toggle" class="icon-btn theme-toggle" type="button" aria-label="Toggle theme">
            <span id="theme-icon-light" class="theme-icon" aria-hidden="true">☀</span>
            <span id="theme-icon-dark" class="theme-icon hidden" aria-hidden="true">☾</span>
          </button>
        </div>
      </header>

      <div class="main-body">
        <div class="page-header">
          <h2 id="page-title">Select an object</h2>
          <p id="page-subtitle">Choose a QuickBooks object from the sidebar to view synced data.</p>
        </div>

        <section class="stats-row">
          <div class="stat-card">
            <span class="stat-label">Records</span>
            <strong id="stat-records">—</strong>
          </div>
          <div class="stat-card">
            <span class="stat-label">Table</span>
            <strong id="stat-table">—</strong>
          </div>
          <div class="stat-card">
            <span class="stat-label">Last action</span>
            <strong id="stat-status">Ready</strong>
          </div>
        </section>

        <section class="content-card">
          <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <span>Loading data...</span>
          </div>

          <div id="empty-state" class="empty-state">
            <div class="empty-icon">▦</div>
            <h3>No object selected</h3>
            <p>Select a QuickBooks object from the menu to view its Supabase data.</p>
          </div>

          <div id="table-wrap" class="table-wrap hidden">
            <table>
              <thead id="table-head"></thead>
              <tbody id="table-body"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>

  <dialog id="detail-dialog" class="detail-dialog">
    <div class="dialog-header">
      <h3>Record details</h3>
      <button id="close-dialog" class="icon-btn" type="button" aria-label="Close">×</button>
    </div>
    <pre id="detail-content"></pre>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
